name: AI Trading Bot
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:      

env:
  # Questa riga risolve l'avviso che hai visto
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        # Aggiornato alla v5 (o superiore per Node 24)
        uses: actions/checkout@v5

      - name: Setup Python
        # Aggiornato alla v6
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Installazione Librerie
        run: pip install ccxt groq

      - name: Esecuzione Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          BITGET_PASSWORD: ${{ secrets.BITGET_PASSWORD }}
        run: python bot.py
