name: AI Trading Bot

on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora esatta
  workflow_dispatch: # Ti permette di lanciarlo a mano per testare

env:
  # Obbligatorio nel 2026 per evitare avvisi di obsolescenza su Node.js
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        # v4 o v5 vanno benissimo, sono le versioni stabili
        uses: actions/checkout@v5

      - name: Setup Python
        # Usiamo la v5 o v6 per massima compatibilità con Node 24
        uses: actions/setup-python@v6
        with:
          # FONDAMENTALE: Usiamo 3.11 per far funzionare pandas-ta senza errori
          python-version: '3.12'

      - name: Installazione Librerie
        # Nota: usiamo il trattino 'pandas-ta' per l'installazione, è più sicuro
        run: |
          python -m pip install --upgrade pip
          # Blocchiamo pandas alla versione 2.2.2 per evitare conflitti con la 3.0
          pip install "pandas<3.0" ccxt groq tavily-python pandas-ta

      - name: Esecuzione Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          BITGET_PASSWORD: ${{ secrets.BITGET_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python bot.py
