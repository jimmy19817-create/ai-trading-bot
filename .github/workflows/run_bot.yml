name: AI Trading Bot
on:
  schedule:
    - cron: '0 * * * *' # Il bot girerà automaticamente ogni ora
  workflow_dispatch:      # Questo ti permette di farlo partire a mano per testare

jobs:
  trading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Librerie
        run: pip install ccxt groq

      - name: Esecuzione Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python bot.py
